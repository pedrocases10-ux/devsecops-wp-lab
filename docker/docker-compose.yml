version: '3.8'

services:
  # 1. Database Service (MySQL)
  database:
    image: mysql:5.7
    container_name: wp-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2. WordPress Service (Older version used intentionally to ensure WPScan finds vulnerabilities)
  wordpress:
    depends_on:
      - database
    image: wordpress:5.0  # <--- Using an outdated and vulnerable version for security testing
    container_name: wp-site
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: database:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html

volumes:
  db_data:
  wp_data: