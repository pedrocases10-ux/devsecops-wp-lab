name: WordPress WPScan - Vulnerability Discovery Pipeline

on:
  push:
    branches:
      - main

jobs:
  wordpress-wpscan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Docker environment
        run: |
          sudo systemctl start docker
          docker version

      - name: Start MySQL container
        run: |
          docker run -d --name wp-db \
            -e MYSQL_ROOT_PASSWORD=password \
            -e MYSQL_DATABASE=wordpress \
            -e MYSQL_USER=wpuser \
            -e MYSQL_PASSWORD=wppass \
            -p 3306:3306 \
            mysql:5.7

      - name: Wait for Database to be FULLY Ready
        run: |
          echo "Waiting for database to accept connections..."
          until docker exec wp-db mysqladmin ping -h"localhost" -u"wpuser" -p"wppass" --silent; do
            echo "Database is starting up..."
            sleep 3
          done
          echo "Database is ready!"

      - name: Start WordPress container
        run: |
          docker run -d --name wp-site \
          --link wp-db:mysql \
          -e WORDPRESS_DB_HOST=wp-db:3306 \
          -e WORDPRESS_DB_USER=wpuser \
          -e WORDPRESS_DB_PASSWORD=wppass \
          -e WORDPRESS_DB_NAME=wordpress \
          -p 8080:80 \
          wordpress:5.0

      - name: Wait for WordPress and AUTO-INSTALL
        run: |
          echo "Giving WordPress 15 seconds to open port 8080..."
          sleep 15
          
          echo "Downloading WP-CLI to automate installation..."
          curl -sS https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar -o wp-cli.phar
          chmod +x wp-cli.phar
          docker cp wp-cli.phar wp-site:/var/www/html/wp-cli.phar
          
          echo "Executing auto-installation of WordPress via CLI..."
          docker exec wp-site php /var/www/html/wp-cli.phar core install \
            --url=http://localhost:8080 \
            --title="DevSecOps Lab" \
            --admin_user=admin \
            --admin_password=password123 \
            --admin_email=admin@example.com \
            --allow-root
          
          echo "WordPress is now fully configured and active!"

      - name: Inject Vulnerable Plugin (Post-Install)
        run: |
          echo "Injecting vulnerable component into live instance..."
          # Forzamos la creación de la carpeta final de plugins por si acaso
          docker exec wp-site mkdir -p /var/www/html/wp-content/plugins/contact-form-7
          # Copiamos directamente el plugin del repositorio dentro de la carpeta activa
          docker cp ./docker/contact-form-7/. wp-site:/var/www/html/wp-content/plugins/contact-form-7/
          echo "Plugin injected successfully!"

      - name: Install Ruby and WPScan
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-full build-essential libcurl4-openssl-dev zlib1g-dev
          sudo gem install wpscan

      - name: Run WPScan
        run: |
          wpscan --url http://localhost:8080 --enumerate u,vp,vt --force --api-token d8ZHbFb2ljNDDho1Qw8x2gB2GsbEkOc8Jk7OTeHPZhQ || true
